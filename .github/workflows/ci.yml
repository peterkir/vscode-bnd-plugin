name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-lsp:
    name: Build bnd-lsp JAR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build bnd-lsp shadow JAR
        run: ./gradlew test shadowJar
        working-directory: bnd-lsp

      - name: Copy JAR to stable release name
        run: |
          mkdir -p bnd-lsp/build/release
          cp bnd-lsp/build/libs/bnd-lsp-*.jar bnd-lsp/build/release/bnd-lsp.jar

      - name: Upload bnd-lsp JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: bnd-lsp-jar
          path: bnd-lsp/build/release/bnd-lsp.jar
          retention-days: 30

  build:
    name: Build & Package Extension
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install client dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile:all

      - name: Package extension
        run: npm run package

      - name: Get VSIX filename
        id: vsix_name
        run: echo "name=$(node -p "require('./package.json').name + '-' + require('./package.json').version + '.vsix'")" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.vsix_name.outputs.name }}
          path: "*.vsix"
          retention-days: 30
