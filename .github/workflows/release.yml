name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Publish Extension and bnd-lsp JAR
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build bnd-lsp shadow JAR
        run: ./gradlew shadowJar -PprojectVersion="${{ github.ref_name }}"
        working-directory: bnd-lsp

      - name: Copy JAR to stable release name
        run: |
          mkdir -p bnd-lsp/build/release
          cp bnd-lsp/build/libs/bnd-lsp-*.jar bnd-lsp/build/release/bnd-lsp.jar

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install client dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile:all

      - name: Package extension
        run: npm run package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.vsix
            bnd-lsp/build/release/bnd-lsp.jar
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
